      spawn_position: [314.119965, -150.843727, 0.481942, 0, -89.489075, 0] # [314.119965, -140.843727, 0.481942, 0, -89.489075, 0]
      destination: [314.587738, -200.297791, 0.400000]
      v2x:
        enabled: false
      behavior:
        local_planner:
          debug_trajectory: false
          debug: false
      sensing:
        perception:
          activate: false
          connected: false
          lidar:
            visualize: true
            channels: 64
            range: 50
            points_per_second: 10000000
            rotation_frequency: 100 # the simulation is 20 fps
            # upper_fov: 90
            # lower_fov: -90
            horizontal_fov: 360
            # dropoff_general_rate: 0
            # dropoff_intensity_limit: 0
            # dropoff_zero_intensity: 0
            # noise_stddev: 0.02
          
        
    - name: neighboring
      spawn_position: [310.917511, -161.227646, 0.400000, 0, 90.510933, 0] # [310.917511, -161.227646, 0.400000, 0, 90.510933, 0]
      destination: [310.917511, -100.582977, 0.581942]
      vehicle_type: vehicle.mitsubishi.fusorosa
      v2x:
        enabled: false
      behavior:
        max_speed: 30
        local_planner:
          debug_trajectory: false
          debug: false
      sensing:
        perception:
          activate: false
          connected: false


    - name: subject
      spawn_position: [295.782043, -169.035751, 0.539108,  0, 0.326125, 0] # [290.782043, -169.035751, 0.539108,  0, 0.326125, 0] 
      destination: [340.705292, -168.825424, 0.600000]
      vehicle_type: vehicle.dodge.charger_2020
      v2x:
        enabled: false
      behavior:
        local_planner:
          debug_trajectory: false
